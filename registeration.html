<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign Up - Olivia & Co.</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Baseline styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body{
      font-family: 'Inter', sans-serif;
      background-color: #fefaf5;
      color: #2c2418;
      transition: background-color 0.3s ease, color 0.2s ease;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 1.5rem;
    }
    body.dark {
      background-color: #121212;
      color: #ece8e0;
    }
    
    /* Premium background patterns */
    .bg-pattern {
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(95, 139, 111, 0.05) 0%, transparent 60%);
      z-index: 0;
      animation: rotateBg 60s linear infinite;
      pointer-events: none;
    }
    body.dark .bg-pattern {
      background: radial-gradient(circle at 50% 50%, rgba(95, 139, 111, 0.15) 0%, transparent 60%);
    }

    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Logo Styles */
    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.85rem;
    }
    .logo-icon {
      font-size: 1.8rem;
      color: #5f8b6f;
    }
    @keyframes textGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .logo-text {
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #3f2e21, #5f8b6f, #b89f7a, #3f2e21);
      background-size: 300% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: textGradient 6s linear infinite;
      text-decoration: none;
      white-space: nowrap;
    }
    body.dark .logo-text {
      background: linear-gradient(90deg, #f0e9df, #8fbc9f, #d4c3aa, #f0e9df);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
    }

    /* Register Card Glassmorphism */
    .register-container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1.5rem 2rem;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.4);
      border: 1px solid rgba(233, 223, 211, 0.6);
      width: 100%;
      max-width: 440px;
      z-index: 1;
      position: relative;
      transform: translateY(0);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    
    .register-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 60px rgba(95, 139, 111, 0.08);
    }
    
    .register-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 60px rgba(95, 139, 111, 0.08);
    }

    body.dark .register-container {
      background: rgba(31, 27, 22, 0.85);
      border-color: #3a2e26;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    body.dark .register-container:hover {
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
    }

    .form-title {
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      color: #3f2e21;
    }
    body.dark .form-title {
      color: #f0e9df;
    }

    .form-subtitle {
      font-size: 0.9rem;
      color: #7a6a58;
      text-align: center;
      margin-top: -0.25rem;
      margin-bottom: 0.85rem;
      font-weight: 400;
      line-height: 1.4;
    }
    body.dark .form-subtitle {
      color: #bfae9a;
    }

    .input-group {
      margin-bottom: 0.85rem;
      position: relative;
    }
    
    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #5a4a38;
      transition: color 0.2s;
    }
    body.dark .input-group label {
      color: #c7b59b;
    }
    
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    
    .input-wrapper i.icon-left {
      position: absolute;
      left: 1.2rem;
      color: #a09383;
      font-size: 0.95rem;
      pointer-events: none;
    }

    .input-field {
      width: 100%;
      padding: 0.8rem 1.25rem 0.8rem 3rem;
      border: 1px solid #e9dfd3;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      background-color: rgba(255, 255, 255, 0.9);
      color: #2c2418;
      outline: none;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    body.dark .input-field {
      background-color: rgba(31, 27, 22, 0.6);
      border-color: #4a3e34;
      color: #f0e9df;
    }

    .input-field:focus {
      border-color: #5f8b6f;
      box-shadow: 0 0 0 4px rgba(95, 139, 111, 0.1);
    }
    
    body.dark .input-field:focus {
      border-color: #7b9e8a;
      box-shadow: 0 0 0 4px rgba(123, 158, 138, 0.15);
    }

    .eye-icon {
      position: absolute;
      right: 1.2rem;
      color: #a09383;
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s;
      z-index: 2;
    }
    .eye-icon:hover {
      color: #5f8b6f;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.85rem;
    }
    
    .custom-checkbox {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #cfbcab;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      background-color: transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .custom-checkbox:checked {
      background-color: #5f8b6f;
      border-color: #5f8b6f;
    }
    .custom-checkbox:checked::after {
      content: '\f00c';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      color: white;
      font-size: 10px;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .checkbox-group label {
      font-size: 0.85rem;
      color: #5a4a38;
      cursor: pointer;
      user-select: none;
    }
    body.dark .checkbox-group label {
      color: #c7b59b;
    }
    
    .checkbox-group label a {
      color: #5f8b6f;
      text-decoration: none;
      font-weight: 600;
    }
    
    .checkbox-group label a:hover {
      text-decoration: underline;
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #5f8b6f, #4a6f58);
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 20px rgba(95, 139, 111, 0.25);
      position: relative;
      overflow: hidden;
    }
    
    .btn-submit::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.3s, transform 0.3s;
    }
    
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(95, 139, 111, 0.4);
    }
    
    .btn-submit:hover::after {
      opacity: 1;
      transform: scale(1);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 0.85rem 0;
      color: #a09383;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e9dfd3;
    }
    .divider:not(:empty)::before {
      margin-right: .5em;
    }
    .divider:not(:empty)::after {
      margin-left: .5em;
    }
    body.dark .divider::before, body.dark .divider::after {
      border-bottom-color: #4a3e34;
    }

    .social-login {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .social-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid #e9dfd3;
      background-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      color: #3f2e21;
      transition: all 0.3s;
    }
    body.dark .social-btn {
      border-color: #4a3e34;
      color: #f0e9df;
    }
    .social-btn:hover {
      transform: translateY(-3px);
    }
    .social-btn i {
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s ease;
    }
    .social-btn:hover i {
      transform: scale(1.25);
    }
    .social-btn.google { color: #DB4437; }
    .social-btn.google:hover {
      background-color: #DB4437;
      border-color: #DB4437;
      box-shadow: 0 8px 20px rgba(219, 68, 55, 0.3);
    }
    .social-btn.google:hover i {
      color: white !important;
    }
    .social-btn.facebook { color: #4267B2; }
    .social-btn.facebook:hover {
      background-color: #4267B2;
      border-color: #4267B2;
      box-shadow: 0 8px 20px rgba(66, 103, 178, 0.3);
    }
    .social-btn.facebook:hover i {
      color: white !important;
    }
    .social-btn.apple { color: #000000; }
    .social-btn.apple:hover {
      background-color: #000000;
      border-color: #000000;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    body.dark .social-btn.apple { color: #ffffff; }
    body.dark .social-btn.apple:hover {
      background-color: #ffffff;
      border-color: #ffffff;
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.3);
    }
    .social-btn.apple:hover i {
      color: white !important;
    }
    body.dark .social-btn.apple:hover i {
      color: black !important;
    }

    .signin-link {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #5a4a38;
    }
    body.dark .signin-link {
      color: #c7b59b;
    }
    .signin-link a {
      color: #5f8b6f;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .signin-link a:hover {
      color: #4a6f58;
      text-decoration: underline;
    }
    
    /* Top Controls */
    .top-controls {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.75rem;
      z-index: 10;
      transition: right 0.3s, left 0.3s;
    }
    .icon-btn {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid #e9dfd3;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #2c2418;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-3px);
    }
    .icon-btn i {
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s ease;
    }
    .icon-btn:hover i {
      transform: scale(1.18) rotate(15deg);
    }
    #themeToggle:hover {
      box-shadow: 0 0 15px rgba(184, 159, 122, 0.4);
    }
    body.dark #themeToggle:hover {
      box-shadow: 0 0 15px rgba(240, 233, 223, 0.4);
      color: #ffd05b;
    }
    #rtlToggle:hover {
      box-shadow: 0 0 15px rgba(95, 139, 111, 0.3);
    }
    body.dark .icon-btn {
      background: rgba(31, 27, 22, 0.5);
      border-color: #4a3e34;
      color: #f0e9df;
    }
    body.dark .icon-btn:hover {
      background: rgba(31, 27, 22, 0.9);
    }
    
    /* RTL Adjustments */
    body.rtl { direction: rtl; }
    body.rtl .top-controls { right: auto; left: 1.5rem; }
    body.rtl .input-wrapper i.icon-left { left: auto; right: 1rem; }
    body.rtl .input-field { padding: 0.85rem 2.8rem 0.85rem 1rem; }
    body.rtl .eye-icon { right: auto; left: 1rem; }
/* ==========================================================================
       GLOBAL RESPONSIVE OVERRIDES (Mobile Breakpoints: 320px, 480px, 768px, 1024px)
       ========================================================================== */
    html, body{
      max-width: 100% !important;
      overflow-x: clip !important;
      box-sizing: border-box !important;
    }
    *, *::before, *::after {
      box-sizing: inherit !important;
    }
    img, video, picture, iframe {
      max-width: 100% !important;
      height: auto !important;
    }
    p, h1, h2, h3, h4, h5, h6, span, a, li {
      word-wrap: break-word !important;
      overflow-wrap: break-word !important;
    }

    /* Prevent flex containers or elements with fixed widths from overflowing */
    .container, .gallery-wrapper, .vip-wrapper, .workshop-wrapper, .pr-container, .editorial-container, .contact-section {
      width: 100% !important;
      max-width: 100% !important;
      overflow-x: clip !important;
    }

    @media (max-width: 1024px) {
      /* Smooth out desktop-to-tablet transitions */
      .cards-grid, .pricing-grid, .profiles-grid, .science-bento-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }

    @media (max-width: 768px) {
      /* Mobile layout stack overrides */
      section, 
      .about-section, 
      .ws-custom-box, 
      .ws-holiday, 
      .ws-corporate, 
      .ws-gourmet, 
      .ws-packaging, 
      .ws-unboxing, 
      .ws-shipping, 
      .vip-journey, 
      .vip-selections, 
      .vip-benefits, 
      .vip-pricing, 
      .vip-testimonials, 
      .collection-section, 
      .features-section, 
      .heritage-section, 
      .pairing-section, 
      .club-section, 
      .testimonial-section,
      .terroir-section,
      .sustainability-section,
      .join-society-section,
      .creative-hero,
      .pairing-container,
      .exhibit-row,
      .exhibit-row.reverse,
      .asymmetric-section,
      .alchemy-section,
      .cultivars-section {
        padding: 2.5rem 1.25rem !important;
        margin-top: 0 !important;
        margin-bottom: 0 !important;
      }
      .editorial-container {
        padding: 0 1.25rem !important;
        margin-top: 1.5rem !important;
        margin-bottom: 3rem !important;
      }
      .about-hero, .ws-hero, .contact-hero, .editorial-hero, .vip-hero-content {
        padding: 3.5rem 1.25rem !important;
        min-height: auto !important;
      }
      
      /* Typography responsive scaling */
      h1, .ws-hero h1, .ws-corp-text h2, .vip-section-title, .ws-holiday h2, .ws-gourmet h2, .ws-packaging h2, .ws-unboxing h2, .ws-shipping h2, .gallery-title {
        font-size: clamp(1.8rem, 7vw, 2.5rem) !important;
        line-height: 1.2 !important;
      }
      h2, .about-text h2, .section-title, .exhibit-text h2, .reserve-content h2 {
        font-size: clamp(1.5rem, 5.5vw, 1.8rem) !important;
        line-height: 1.2 !important;
      }
      h3 {
        font-size: clamp(1.2rem, 4.5vw, 1.4rem) !important;
      }

      /* Stack grids and columns vertically */
      .cards-grid, 
      .features-grid, 
      .testimonial-grid, 
      .collection-grid, 
      .about-grid, 
      .values-grid, 
      .ws-bento-grid, 
      .ws-pack-grid, 
      .ws-timeline, 
      .journey-grid, 
      .pricing-grid, 
      .benefits-grid, 
      .blog-layout, 
      .two-columns, 
      .contact-grid, 
      .matrix-grid, 
      .triptych-grid, 
      .masonry-grid,
      .terroir-grid,
      .creative-hero,
      .ws-custom-container,
      .ws-corp-container,
      .zig-zag-row,
      .profiles-grid,
      .sommelier-layout,
      .science-bento-grid,
      .sommelier-steps,
      .ws-steps-list,
      .feature-grid,
      .pairing-ingredients,
      .seasons-grid,
      .cultivar-grid,
      .alchemy-stages,
      .article-list,
      .article-item,
      .sidebar,
      .tags-cloud,
      .exhibit-row,
      .exhibit-row.reverse,
      .pricing-grid,
      .testi-grid,
      .seasons-grid,
      .cultivar-grid {
        grid-template-columns: 1fr !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 1.5rem !important;
      }
      
      /* Make items span full width when stacked */
      .matrix-col, .masonry-item, .triptych-card, .ws-pack-item, .ws-holiday-card, .selection-card, .price-card, .testi-card, .benefit-item, .journey-step, .profile-card, .science-card {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 100% !important;
      }
      
      /* Custom timeline stacking */
      .timeline::before, .ws-timeline::before, .alchemy-stages::before {
        display: none !important;
      }
      .timeline-item, .ws-timeline-item {
        width: 100% !important;
        left: 0 !important;
        text-align: left !important;
        padding: 0 0 1.5rem 1.5rem !important;
        border-left: 2px solid #5f8b6f !important;
        border-bottom: none !important;
        display: flex !important;
        flex-direction: column !important;
      }
      .alchemy-stage {
        width: 100% !important;
        left: 0 !important;
        text-align: left !important;
        padding: 0 0 1.5rem 1.5rem !important;
        border-left: none !important;
        border-bottom: none !important;
        display: flex !important;
        flex-direction: column !important;
      }
      .timeline-dot, .ws-timeline-icon, .alchemy-number {
        left: -6px !important;
        right: auto !important;
        position: absolute !important;
      }
      
      /* RTL Support for stacked timeline */
      body.rtl .timeline-item, body.rtl .ws-timeline-item {
        text-align: right !important;
        padding-left: 0 !important;
        padding-right: 1.5rem !important;
        border-left: none !important;
        border-right: 2px solid #5f8b6f !important;
      }
      body.rtl .alchemy-stage {
        text-align: right !important;
        padding-left: 0 !important;
        padding-right: 1.5rem !important;
        border-left: none !important;
        border-right: none !important;
      }
      body.rtl .timeline-dot, body.rtl .ws-timeline-icon, body.rtl .alchemy-number {
        left: auto !important;
        right: -6px !important;
      }

      /* Horizontal scroll elements stack vertically on mobile */
      .ws-scroll-row, .selections-wrapper {
        flex-direction: column !important;
        overflow-x: visible !important;
        padding: 1rem 0 !important;
        margin: 0 !important;
      }
      .ws-holiday-card, .selection-card {
        min-width: 100% !important;
        width: 100% !important;
        max-width: 100% !important;
      }

      /* Flex and spacing adjustments */
      .info-text, .info-image, .ws-visualizer, .ws-corp-img, .ws-corp-text, .exhibit-img, .exhibit-text {
        width: 100% !important;
        flex: none !important;
      }
      .ws-visualizer {
        position: static !important;
      }

      /* Image height adjustments for mobile */
      .exhibit-img img, .form-image img, .map-box img {
        height: auto !important;
        max-height: 300px !important;
        width: 100% !important;
        box-shadow: none !important;
      }
      
      /* Buttons fit mobile screens */
      .btn, .btn-primary, .btn-submit, .btn-secondary, .vip-btn, .login-btn, .mobile-login-btn, .gallery-btn {
        width: 100% !important;
        text-align: center !important;
        display: block !important;
        padding: 0.8rem 1.25rem !important;
      }
    }

    @media (max-width: 480px) {
      h1, .ws-hero h1 { font-size: 1.6rem !important; }
      h2, .about-text h2, .section-title { font-size: 1.35rem !important; }
      h3 { font-size: 1.15rem !important; }

      .login-container, .register-container, .ws-step, .sidebar-widget, .price-card, .value-card, .benefit-circle, .testi-card {
        padding: 1rem 0.75rem !important;
      }
      .ws-pack-item {
        width: 100% !important;
        height: auto !important;
        aspect-ratio: 1 !important;
      }
      .selection-card, .ws-holiday-card {
        height: auto !important;
      }
      
      /* Section padding reduction for small screens */
      main, section, .editorial-container, .alchemy-container, .workshop-wrapper, .pr-container, .contact-section {
        padding-left: 0.75rem !important;
        padding-right: 0.75rem !important;
        padding-top: 1.5rem !important;
        padding-bottom: 1.5rem !important;
      }
    }

    @media (max-width: 320px) {
      h1, .ws-hero h1 { font-size: 1.45rem !important; }
      h2, .about-text h2 { font-size: 1.2rem !important; }
      
      /* Extra padding reduction */
      main, section, .editorial-container, .alchemy-container, .workshop-wrapper, .pr-container, .contact-section {
        padding-left: 0.5rem !important;
        padding-right: 0.5rem !important;
        padding-top: 1.25rem !important;
        padding-bottom: 1.25rem !important;
      }
    }

    /* RTL Support for Font Awesome directional icons */
    body.rtl .fa-arrow-right, 
    body.rtl .fa-long-arrow-alt-right, 
    body.rtl .fa-chevron-right {
      display: inline-block !important;
      transform: scaleX(-1) !important;
    }
    </style>
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🫒</text></svg>">

        <!-- GLOBAL RESPONSIVE SCALING (Aligned with about.html behavior) -->
  <style id="global-responsive-scaling">
    html, body{
      overflow-x: clip !important;
      width: 100% !important;
      max-width: 100vw !important;
    }
    *, *::before, *::after {
      box-sizing: border-box !important;
    }
    img, video, iframe {
      max-width: 100% !important;
    }
    
    /* Ensure text doesn't overflow */
    p, h1, h2, h3, h4, h5, h6, a, span, div {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    @media (max-width: 1024px) {
      h1, .hero-title { font-size: clamp(2.5rem, 5vw, 4rem) !important; }
      .ws-hero h1, .editorial-hero-content h1, .alchemy-header h1, .about-hero h1, .hero-content h1, .contact-hero h1 { font-size: 3rem !important; }
      main, section, .editorial-container, .alchemy-container, .workshop-wrapper, .pr-container, .contact-section { padding-left: 2rem !important; padding-right: 2rem !important; }
    }
    
    @media (max-width: 768px) {
      /* Typography */
      h1, .ws-hero h1, .editorial-hero-content h1, .alchemy-header h1, .about-hero h1, .hero-content h1, .contact-hero h1 { font-size: 2.2rem !important; margin-bottom: 1rem !important; }
      p, .ws-hero p, .editorial-hero-content p, .alchemy-header p, .hero-content p, .contact-hero p { font-size: 1rem !important; }
      h2, .editorial-title, .pairing-title, .bento-title, .ws-step h2, .taste-matrix h2, .section-header h2 { font-size: 1.8rem !important; margin-bottom: 1rem !important; }
      h3, .info-card h3, .visit-info h3, .cta-banner h3 { font-size: 1.4rem !important; }
      
      /* Padding and Layouts */
      body { padding: 5rem 1rem 2rem !important; }
      main, section, .editorial-container, .alchemy-container, .workshop-wrapper, .pr-container, .contact-section { padding-top: 3rem !important; padding-bottom: 3rem !important; padding-left: 1.25rem !important; padding-right: 1.25rem !important; }
      
      /* Stack multi-column layouts universally */
      .pairing-section, .editorial-section, .ws-step, .bento-grid, .taste-matrix, .contact-grid, .contact-cards, .visit-card, .footer-container, .bento-item, .features-grid, .society-perks { 
          display: flex !important; 
          flex-direction: column !important; 
          gap: 2rem !important;
      }
      .pairing-section.reverse { flex-direction: column !important; }
      .matrix-col { width: 100% !important; margin-bottom: 1.5rem; }
      
      /* Fix form, map, cards */
      .visit-info, .contact-form-wrapper, .info-card { width: 100% !important; min-height: auto !important; padding: 1.5rem !important; }
      .form-image, .map-box { width: 100% !important; min-height: auto !important; padding: 0 !important; overflow: hidden; border-radius: 20px; }
      .form-image img, .map-box iframe, .map-box img { position: relative !important; height: 300px !important; width: 100% !important; display: block !important; object-fit: cover !important; }
      
      /* Fix Decorative Images in Contact */
      div[style*="display: flex; gap: 1rem; justify-content: center"] {
          flex-wrap: wrap !important;
      }
      div[style*="display: flex; gap: 1rem; justify-content: center"] img {
          width: calc(50% - 0.5rem) !important;
          height: 180px !important;
          margin-bottom: 1rem;
      }
      
      /* Image constraints */
      .pairing-visual img, .editorial-img-wrap img { height: auto !important; max-height: 350px; object-fit: cover; }
      
      /* Buttons */
      .btn-submit, .btn-secondary { width: 100% !important; text-align: center !important; }
      
      /* Adjust custom inline styles */
      div[style*="max-width: 1200px;"] { max-width: 100% !important; padding-left: 1rem !important; padding-right: 1rem !important; }
    }
    
    @media (max-width: 480px) {
      /* Smaller typography */
      h1, .ws-hero h1, .editorial-hero-content h1, .alchemy-header h1, .about-hero h1, .hero-content h1, .contact-hero h1 { font-size: 1.8rem !important; }
      h2, .editorial-title, .pairing-title, .bento-title, .ws-step h2, .section-header h2 { font-size: 1.5rem !important; }
      h3 { font-size: 1.25rem !important; }
      p, .info-card p, .visit-info p, .form-label { font-size: 0.95rem !important; }
      
      /* Spacing */
      body { padding: 4.5rem 0.75rem 1.5rem !important; }
      main, section, .editorial-container, .alchemy-container, .workshop-wrapper, .pr-container, .contact-section { padding-top: 2rem !important; padding-bottom: 2rem !important; padding-left: 1rem !important; padding-right: 1rem !important; }
      .footer { padding: 2rem 1rem 1.5rem !important; }
      
      /* Contact specific fixes */
      .contact-hero { padding: 4rem 1rem !important; }
      .info-icon { width: 50px !important; height: 50px !important; font-size: 1.4rem !important; }
      
      /* Decor images strip - full width */
      div[style*="display: flex; gap: 1rem; justify-content: center"] img {
          width: 100% !important;
          height: 200px !important;
          margin-left: 0 !important;
          margin-right: 0 !important;
      }
    }

    @media (max-width: 320px) {
      /* Extra small devices */
      body { padding: 4rem 0.5rem 1rem !important; }
      h1, .contact-hero h1 { font-size: 1.5rem !important; }
      h2, .section-header h2 { font-size: 1.3rem !important; }
      main, section, .contact-section { padding-left: 0.75rem !important; padding-right: 0.75rem !important; }
      .btn-submit, .btn-secondary { font-size: 0.9rem !important; padding: 0.8rem !important; }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  
  <div class="top-controls">
    <button class="icon-btn" id="rtlToggle" aria-label="Toggle RTL mode">
      <i class="fa-solid fa-right-left"></i>
    </button>
    <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode">
      <i class="fas fa-moon" id="themeIcon"></i>
    </button>
  </div>

  <div class="register-container">
    <div class="logo-area">
      <i class="fas fa-olive-branch logo-icon"></i>
      <a href="index.html" class="logo-text">Olivia & Co.</a>
    </div>
    
    <h1 class="form-title">Create an Account</h1>
    <p class="form-subtitle">Join us to experience exclusive oil tastings and premium events</p>
    
    <form action="#" method="POST" id="registerForm">
      <div class="input-group">
        <label for="fullname">Full Name</label>
        <div class="input-wrapper">
          <i class="fas fa-user icon-left"></i>
          <input type="text" id="fullname" class="input-field" placeholder="Enter your full name" required>
        </div>
      </div>

      <div class="input-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope icon-left"></i>
          <input type="email" id="email" class="input-field" placeholder="Enter your email" required>
        </div>
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock icon-left"></i>
          <input type="password" id="password" class="input-field" placeholder="Create a password" required>
          <i class="fas fa-eye eye-icon" id="togglePassword"></i>
        </div>
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock icon-left"></i>
          <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm your password" required>
          <i class="fas fa-eye eye-icon" id="toggleConfirmPassword"></i>
        </div>
      </div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="terms" class="custom-checkbox" required>
        <label for="terms">I agree to the <a href="#">Terms</a> & <a href="#">Privacy Policy</a></label>
      </div>
      
      <button type="submit" class="btn-submit">Sign Up</button>
    </form>
    
    <div class="divider">Or register with</div>
    
    <div class="social-login">
      <button class="social-btn google" type="button" aria-label="Sign up with Google"><i class="fab fa-google"></i></button>
      <button class="social-btn facebook" type="button" aria-label="Sign up with Facebook"><i class="fab fa-facebook-f"></i></button>
      <button class="social-btn apple" type="button" aria-label="Sign up with Apple"><i class="fab fa-apple"></i></button>
    </div>
    
    <div class="signin-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    // Password visibility toggle
    function setupPasswordToggle(toggleId, inputId) {
      const toggle = document.getElementById(toggleId);
      const input = document.getElementById(inputId);
      
      if (toggle && input) {
        toggle.addEventListener('click', function () {
          const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
          input.setAttribute('type', type);
          this.classList.toggle('fa-eye-slash');
        });
      }
    }

    setupPasswordToggle('togglePassword', 'password');
    setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');

    // Dark Mode Support
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const body = document.body;
    
    const DARK_KEY = 'oliveOilDarkMode';
    function setDarkMode(isDark) {
      if(isDark) {
        body.classList.add('dark');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
      } else {
        body.classList.remove('dark');
        themeIcon.classList.remove('fa-sun');
        themeIcon.classList.add('fa-moon');
      }
      localStorage.setItem(DARK_KEY, isDark);
    }
    
    function loadDarkMode() {
      const saved = localStorage.getItem(DARK_KEY);
      if(saved === 'true') setDarkMode(true);
      else if(saved === 'false') setDarkMode(false);
      else setDarkMode(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
    
    loadDarkMode();
    
    themeToggle.addEventListener('click', () => {
      setDarkMode(!body.classList.contains('dark'));
    });

    // RTL Support
    const rtlToggle = document.getElementById('rtlToggle');
    let isRtl = false;
    
    rtlToggle.addEventListener('click', () => {
      isRtl = !isRtl;
      if (isRtl) {
        body.setAttribute('dir', 'rtl');
        body.classList.add('rtl');
      } else {
        body.setAttribute('dir', 'ltr');
        body.classList.remove('rtl');
      }
    });
  </script>
</body>
</html>
